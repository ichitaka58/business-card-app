name: Jest Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Run Jest tests
      env:
        CI: true
        NEXT_PUBLIC_SUPABASE_URL: "http://localhost"
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: "dummy"
      run: npm test
